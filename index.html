<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Monitor</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>📺 TV Monitor</h1>

    <h2>Каналы</h2>

    <div id="channels" class="channels">
        <!-- кнопки создаются через JavaScript -->
    </div>


    <h2>📋 Проверенные каналы</h2>

    <div id="report" class="report">
    </div>


    <div class="buttons">

        <button onclick="copyReport()">
            📋 Копировать
        </button>


        <button class="clear"
                onclick="clearReport()">
            🗑 Очистить
        </button>

    </div>


</div>


<!-- окно комментария -->

<div id="modal" class="modal">

    <div class="modal-content">

        <h3 id="modalTitle">
            Комментарий
        </h3>


        <textarea id="comment"
        placeholder="Введите комментарий"></textarea>


        <div>

            <button onclick="saveChannel()">
                Добавить
            </button>


            <button onclick="skipComment()">
                Пропустить
            </button>

        </div>

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
