<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Monitoring</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="container">


<h2>📺 Каналы </h2>




<div id="channels" class="channel-list">

</div>



<button class="comment-btn"
onclick="addComment()">

📝 Добавить строку

</button>

<button
    id="editDeleteBtn"
    class="delete-btn"
    disabled
    onclick="showDeleteDialog()">

🗑 Изменить / Удалить строку

</button>


    
<h2>📋 Отчёт</h2>


<div id="report">

</div>



<div class="buttons">


<button onclick="copyReport()">

📋 Сохранить отчёт

</button>



<button class="clear"
onclick="clearReport()">

🗑 Очистить список

</button>


</div>


</div>




<!-- окно комментария -->

<div id="commentModal" class="modal">


<div class="modal-box">


<h3>
Текст
</h3>


<textarea id="commentText"
placeholder="Введите текст">
</textarea>


<button onclick="saveComment()">
Добавить текст
</button>



<button onclick="saveEmptyLine()">
Добавить пустую строку
</button>


<button onclick="closeModal()">

Отмена

</button>


</div>


</div>

<div id="deleteModal" class="modal">

    <div class="modal-box">

        <h3>Выберите действие</h3>

        <button onclick="editSelected()">

            ✏️ Изменить

        </button>

        <button onclick="deleteSelected()">

            🗑 Удалить

        </button>

        <button onclick="closeDeleteModal()">

            Отмена

        </button>

    </div>

</div>

<script src="channels.js"></script>

<script src="script.js"></script>


</body>

</html>
