<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Monitor</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="container">


<h1>📺 TV Monitor</h1>


<div id="checkInfo"></div>


<h2>Каналы</h2>


<div id="channels" class="channel-list">

</div>



<button class="comment-btn"
onclick="addComment()">

📝 Добавить строку с текстом

</button>



<h2>📋 Проверка</h2>


<div id="report">

</div>



<div class="buttons">


<button onclick="copyReport()">

📋 Копировать

</button>



<button class="clear"
onclick="clearReport()">

🗑 Очистить

</button>


</div>


</div>




<!-- окно комментария -->

<div id="commentModal" class="modal">


<div class="modal-box">


<h3>
Текст
</h3>


<textarea id="commentText"
placeholder="Введите текст">
</textarea>


<button onclick="saveComment()">
Сохранить
</button>



<button onclick="saveEmptyLine()">
Добавить пустую строку
</button>

</div>


</div>



<script src="channels.js"></script>

<script src="script.js"></script>


</body>

</html>
